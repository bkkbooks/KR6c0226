body:
  text: 罽賓國三藏般若奉詔譯不退轉品第四爾時慈氏菩薩摩訶薩頭面著地禮佛雙足而白佛言大聖世尊已説菩薩五種發心修行大乘得不退轉然大悲心云何發起云何修行唯願如來哀愍有情廣為宣説利益安樂諸衆生故爾時薄伽梵告慈氏菩薩摩訶薩言善哉善哉善男子快問斯義汝今諦聽善思念之吾當為汝分別解説斷汝疑網所言五種心者第一大悲心當持此心堅固不捨念彼惡趣地獄衆生復思其苦如契經説汝應知之今於此經重為汝説觀諸有情皆是宿世父母宗親所尊重境今在地獄現受衆苦為十三火之所纏繞有二火焰從足而入徹頂而出復有二焰從頂而入通足而出復有二焰自背而入從胸而出復有二焰從胸而入自背而出復有二焰從左脅入穿右脅出復有二焰從右脅入穿左脅出復有一焰從首而纏下至於足然此地獄諸衆生身其形軟弱猶如熟酥為彼衆火交絡焚熱其地獄火燒人間火如燒㲲花無復餘燼或有衆生為火所燒東西馳走以求救護莫知所為復有衆生逃形無地却來赴火復有衆生忽被擲置糞穢深坑坑中有蟲其觜銛利純是銅鐵長十六指啄噉衆生皮骨髓腦復有衆生處煻煨中而被燒煮或有衆生在醎水中而被漂溺是時獄卒以大鐵網從中漉出猶若捕魚置彼衆生熱鐵地上偃臥燒炙次以鐵鉗鑷取其舌復以洋銅灌注其口悶絶而死良久乃穌即欲奔馳意求免離終無得脫復有鐵狗尋即逐之鐵烏鐵觜隨飛而啄骨肉分裂而噉食之遙見園林即欲攀上望得免脫其林樹上皆生鐵刺其一一刺長十六指其刺炎熱衆生欲上刺鋒垂下從胸而入徹背而出受苦無量求脫無由烏鷲飛來啄取雙眼復劈其腦取髓食之從此欲下刺鋒向上眼耳鼻舌身肉手足及十指節悉皆分散隨挂樹上免脫無由獄卒收取盛鐵囊中以熱鐵棒反覆捶打復有衆生手足頭髻五處磔裂以鋸解之復有衆生內鐵臼中以其鐵杵從頭而搗復有衆生在於鑊湯鐵杈翻轉煮之糜爛唯有骨在其命猶存復有衆生處於地獄而以紫礦將為屋舍縱火焚燎其焰洞然紫礦鎔流滴如熱箭復有地獄四面鐵山衆生處中二山相拶或時南北或復東西二山合時其中衆生膿血流出復有地獄而有鐵蛇纏衆生身從足至首而銜其頭盡力縛束髓血集頂吸而食之唯殘皮骨復有地獄諸衆生等而被獄卒三股鐵叉而叉其身從兩足入至頂及肩三處通出其火隨扠猛焰俱發眼耳鼻口火出亦然復有地獄以諸衆生臥熱鐵地或偃仆側次黑鐵繩隨身而拼復以斤斧而斸斫之如工匠師治諸濕木復有衆生被諸獄卒從足至頭㓟取其皮㓟已作繩用充韁轡銜勒衆生上高山頂其山熱鐵驅迫令登鞭撻萬般苦不可説此等衆生從無始來皆我父母內外宗親今者流轉在於地獄經無量劫常受苦惱如已舍宅惡業盡故暫生人天於此造罪還墮地獄菩薩摩訶薩觀此衆生受諸苦已起大悲心次觀鬼趣復起悲心見諸衆生處餓鬼中一日一夜如人一月以日計月十二為年於鬼趣中壽五百歲同於人間萬五千歲常受飢渴耳初不聞漿水之名何況眼見然彼餓鬼身如大山頭如穹廬咽細如針其髮髲下垂覆兩肩猶如利刀割切形體變為猛焰燒爛其身如火燎薪苦痛難忍其兩腋毛下覆腰腹次隱處毛下垂膝踝刀割火燒亦復如是經無量歲受如斯苦或遙見水奔赴求之及到其傍面仆而倒以惡業力其水變為膿血糞穢或作熱砂其水兩岸復有獄卒執持弓箭刀棒鉞斧槍矟斫刺種種捶楚飢火所燒熱渴迷亂尋返馳走猛火焚熱莫知所之獄卒隨逐撾打斫截手足支節悉皆損折復有餓鬼朝産五子隨産食之夜生五子隨生隨食由懷飢餓未曾暫飽或遇天雨仰口承之由業力故一滴入口流入腹中變成猛火直過而出或遇夏月熱風起時吹諸餓鬼墮砂磧中下熱砂燒上為日炙飢渴熱逼望見樹林欲取蔭涼奔走至彼蔭避餓鬼隨至皆移何以故昔於人間或設施會見有乞人慳惜不與非理打罵而驅遣之以是業緣今受斯報復有餓鬼於夜月時淨無雲翳流光照觸毒熱爍身如盛夏時日炙無異復有餓鬼於盛冬時有大風起由業力故吹諸餓鬼猶若飛塵置氷山中受諸寒苦從是受苦經無量時於此命終還墮地獄如是往來經無量歲惡業盡已希得人身生貧賤家慳吝不施以乞自活轉增貪惜以貧窮故造十不善種種諸罪從此命終復墮地獄受種種苦其苦畢已生餓鬼中如是往返經無數劫受如斯苦此等衆生亦於過去無量無邊生死劫中恆為父母六親眷屬常為我故造不善業今在餓鬼受斯苦報菩薩摩訶薩觀是苦已起大悲心復次慈氏鬼趣既然次觀傍生亦復如是有諸麞鹿野干狐兔虎豹豺狼種種諸獸及諸飛鳥野雞鵝鴨鳧鴈鴛鴦如是等類若行若住棲止飛浮恆畏於人大力鳥獸若飲若食未曾暫安晝夜之中常懷怖懼復有傍生黿鼉龜鱉魚蚌蝦蟇室獸摩羅水族之類恆被網捕生死水中復有傍生蛇虺蜴蜥蚰蜒鼠狼此類傍生暗中而生暗中而死復有傍生蟣蝨蚤等依人身生還依人死復有傍生或依死尸或依糞濕或依草木當處而生還當處死或變化生還變化死所謂蛆蟲螟蛉蟊螣蛗螽蛺蝶之類復有傍生恆食膿血及諸不淨以為甘味所謂豬狗蜣蜋蠅虻之類遙聞臭氣以為香美飛走馳赴恐不得餐復有傍生不食美草唯食棘刺不飲清流唯飲濁水復有傍生非依草生而恆食草所謂象馬牛驢駱駝騾等畜生之類或以鐵鉤鉤斫其腦令使調伏得已乘之或穿鼻中或以轡勒籠繫其首負重而行常被鞭撻種種呵罵遲疾須行或有尫羸起已復倒捶楚無限力不能前皆由宿因今受斯苦或食信施無復精勤償他宿債遭此艱苦如是驅役種種鞭打尚未還足或取殺之苦切萬端陳告無所生乏水草病無醫藥死已㓟剝為人噉食如是死已墮於地獄何以故由心愚癡不知善惡不念父母生育劬勞不識因果不聞正法亦無布施持戒善根但念水草餘無所知此等傍生人所畜養除畜養外餘類傍生所謂師子虎豹豺狼及上所説水陸傍生互相殘害更相噉食由是業故生地獄中經無量劫受諸劇苦地獄罪畢復趣傍生如是往來經無量劫此等傍生亦於過去無量無邊生死劫來恆為父母六親眷屬常為我故造不善業今在傍生受斯苦報菩薩摩訶薩觀此苦已起大悲心傍生既然次觀人趣有諸衆生雖生人道多受貧窮飢餓長時裸形露體泥行雨宿霜穫暑耘日夜驅馳手足皴劈頭髮蓬亂羸步而前乞白巡門未曾一飽至於日暮偃臥飢眠取給於他無相濟者雖有言行人不信從雖有姿容反遭輕賤恆行忍辱饒益於人而被嫌呵云自怯懼或有文藝人不録之省覲宗親猜嫌求食或歸信三寶謗謂邀名或讚歎於人便云諂曲或生下賤恆不自安繫屬於人進退唯命常冒寒熱不知溫涼汲水採薪不辭勞倦郎主之意都無愍心小有差遲尋被鞭撻自作自得非天與人薄福所招過於死苦譬如枯樹枝葉皆無一切飛禽不來棲託薄福之人亦復如是爾時薄伽梵重説頌言無言稱癡暗有語謂風狂親近嫌諂諛遠離云恐怖忍辱言怯弱歸信謂邀名貧賤在人間實過於死苦復次慈氏當知貧窮極為大苦雖常親近讚歎於人以無福故過患隨生以貧窮故恆遭凌辱轉造惡業墮捺落迦復有豪貴族姓之人多有僕使象馬牛羊親戚眷屬前後圍繞受勝妙樂猶若諸天五欲迷荒轉增貪恚恆起我慢凌懱於人爾時薄伽梵説伽他曰不攝五根多放逸貪財害己若怨家耽荒五欲如醉人貴賤皆招生死苦佛告慈氏菩薩摩訶薩一切衆生不知現在及與未來自所造業如影隨形諸苦所因貪欲為本更不修習善法津梁燒滅宿因白法皆盡從此沒已復墮三塗所以者何以貪欲故恆斷生命恃己勢力劫奪他財種種方便侵他妻妾恣欲邪行不擇親踈恆起希求作諸妄語詭詐良善綺飾文詞訶毀有情作麁惡語傳説彼此離間他人眷屬諸親不令和睦恆懷貪嫉侮慢自高瞋火所燒善業都盡讚諸外道謗佛法僧祠祀天神以求福祐不知宿世三寶深恩無量劫來為我勤苦修習勝行菩提資糧具一切智號之為佛而於生死長夜暗中為作燈明為歸為救為船為筏拯濟生靈置於人天大涅槃岸衆生邪見我慢貢高猶如醉人五欲纏縛不修善法從此命終墮於地獄傍生鬼趣或在人中下賤貧窮受諸苦惱如被毒箭中於身心善法不修受斯苦報菩薩摩訶薩觀是苦已起大悲心次觀天趣觀彼諸天壽命長遠無諸苦惱將命終時五衰相現一者頭上花鬘悉皆萎悴二者天衣塵垢所著三者腋下自然汗出四者兩目數多眴動五者不樂本居此相現時新生天女皆悉遠離棄之如草舊侍天女愛戀情深圍繞而觀如欲捨命哽咽悲哭各各就前哀號問訊時天報曰彼新天女我亦憐愍無有二心云何今者棄我如草汝等於今悲哀惜我以是因緣於舊生愛新者生瞋五相現前必知死至離天宮處美妙音聲天上色香悅意欲樂迷亂失念離此宮耶諸天會中不得久住我於今日命將盡耶如是苦惱猶箭中心我等無依無怙無親無主無歸無救失聲悲歎諸天快樂而捨我耶又思善見宮城於今將絶帝釋寶座朝謁無由殊勝殿中永斷瞻望釋天寶象何日同乘衆花苑中無復能見麁惡苑內介胄長辭雜林苑中宴會無日喜林園苑遊止無期波利質多及劫波樹白玉軟石更無坐時善法堂中集議長隔曼陀枳尼殊勝池水沐浴無由四種甘露亦難得食五妙音樂頓絶聽聞咄哉大苦無常迅速令我此身獨嬰此苦剎那生滅而至死耶諸天壽命乃如幻夢脫衣棄地痛割身心如被蛇螫極大苦惱瞻仰餘天願垂慈愍濟我壽命更延少日不亦樂乎能為我身除五衰相勿令墮彼馬頭山處沃焦海中雖有是言諸天聞之無能救者此天見已作是思惟彼等諸天不能相救延我壽命以是定知將死不久臨命終時其天自見當生之處墮於地獄傍生鬼趣見是相已哽咽悲號悶絶躃地角眼相視尋即命終隨業而生墮三惡趣以是當知天中大苦流轉不絶無有盡期菩薩摩訶薩觀是苦已起大悲心慈氏當知譬如有人以角弓弰滴大海水弓所得水與大海水何者為多慈氏菩薩摩訶薩白佛言世尊其弓弰水極為微少如何以此比大海乎以是大海極為深廣云何方比弓弰水耶爾時薄伽梵告慈氏菩薩摩訶薩言善男子從人天沒墮三惡趣如大海水復生人天如弓弰水墮三塗者受苦無量不可稱説不可思量如上略説三惡趣苦如殑伽河而得一沙其未説者如殑伽沙壽命亦爾如人間壽經於百年帝釋天中為一晝夜以此晝夜三十為月十二為年壽一千年如人間歲總三俱胝餘六十億以此壽量為彼黑繩大地獄中一日一夜以此日夜三十為月十二月為年滿一千年而為壽量以此千年而於衆合大地獄中為一日夜以此日夜三十為月十二月為年滿二千年以為壽量乃至阿鼻大地獄中壽一中劫以是當知地獄衆生壽命長遠諸天臨終以天眼觀皆悉能知極懷憂惱所有欲樂一時皆失以其苦樂各十六分一分苦生能滅天中十六分樂是為菩薩摩訶薩觀見諸天臨命終時受如是苦起大悲心慈氏當知此即菩薩摩訶薩第一大慈悲心復次應起大精進心拔濟有情置於涅槃安樂之處如彼商主作是思惟父母宗親咸悉貧匱如何方便得免艱難如是思已更無異方唯有入海採如意珠得已還歸色養給侍作是念已入海求之得如意珠置高幢上能雨一切種種珍寶衣服飲食香花妓樂父母宗親隨意所須悉令充足菩薩摩訶薩發菩提心求一切智亦復如是作是思惟一切衆生皆我宿世父母親屬流轉生死現受諸苦以何方便而得免離如是思已更無異方唯有入於六波羅蜜法海之中求一切智如意寶珠以濟斯苦作是念已入法海中而求種智如意寶珠置法幢上布大慈雲普雨一切神通功德陀羅尼門慚愧衣服施為舍宅淨戒之香忍辱花鬘精進之膳禪定為床智慧甘露以為其食諸法空寂而為其座以大涅槃而為寶城諸佛菩薩為善知識降霔如是妙寶衣服香花妓樂如意寶珠一切種智唯除無上調御大師無能拔濟諸苦難者永得安樂究竟涅槃菩薩摩訶薩思惟是已決定自知得不退轉復發是願願我所生有苦難處代諸衆生受諸苦惱不願自證解脫涅槃捨彼衆生自求安樂所以者何一切聲聞及辟支佛自求解脫已入涅槃無量無邊不可勝數不能利樂一切衆生不能稱揚佛身功德菩薩摩訶薩設在三塗能令有情捨不善業修習善法免離衆苦而得解脫況於人中以是因緣菩薩摩訶薩利樂十方一切有情由此義故忉利諸天大梵天王大自在天諸仙外道恭敬供養皆悉容受而此菩薩得不退心三世諸佛所共稱讚與授記別菩薩摩訶薩修大乘者自在無畏如師子王一切衆生隨逐而行永無怖畏直至菩提聲聞緣覺諸阿羅漢聞菩薩教深入巖窟以衣覆頭而趣涅槃豈同大乘修菩薩行自利利他無不蒙益以是因緣轉加精進寧於三塗受無量苦終不自利而取涅槃過現未來一切有情所造惡業應墮惡趣受諸苦者願集我身而代受之我於過去及現在世所修勝行一切善品諸功德法願皆回施一切有情速證涅槃所有珍財我願悉捨打罵凌辱終不加報皆忍受之願彼衆生悉無罪纍無量無邊阿僧祇劫難行苦行我願盡行而為衆生誓求無上正等菩提精進修行禪定解脫得不退轉又如過去無量無邊菩薩摩訶薩精勤修習一切智智我亦當作如是修行所以者何為度一切流轉有情安置涅槃無上解脫復願一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想我皆令入大般涅槃一切衆生皆令圓滿六波羅蜜具足成就無上佛身百福莊嚴三十二相八十種好項背圓光過百千日衆生樂見瞻仰無厭復願十方世界一切衆生功德莊嚴悉皆如佛復發是願願捨此身為於法界一切衆生打罵訶責或時繫縛苦切凌辱欲斷命根種種役使承順無違願彼衆生悉無罪纍發是願已復更思惟願我速得成滿此願復願此身住於五趣利益安樂一切有情無依怙者為作依怙遊他國者為作示導入海之者為作船筏涉溝澗者為作橋梁處曠野者為作泉井寒凍之者為作柴薪盛暑炎毒為作清涼處黑暗者為作燈明疲乏之者作軟敷具飢餓之者作甘美膳渴乏之者化作甜漿為裸露者而作衣服亢旱飢饉為雨五穀病苦之者為作良醫令疾除愈壽命延長孤惸鰥寡而為侍者諸貧窮者為作伏藏隨彼行住不相捨離若遠行者為作伴侶并作車馬令達所至若邪見者為説正法令住正見地獄苦者我誓入彼地獄之中拔濟令出墮餓鬼者為作清涼甘美飲食除熱飢渴墮傍生類虎豹豺狼熊羆師子化作肉山以充食噉復發是願食我肉者悉得充飽不相食噉象馬牛羊麞鹿等獸我為彼作肥膩軟草若諸衆生食肉噉草五穀飲食隨意所須悉令充足處人趣者隨所樂欲我悉供給令無所乏復發是願願我悉得成就一切陀羅尼身隨諸衆生所在之處皆為救護作如意樹及作賢瓶出無盡財給施一切具足圓滿或作醫王除其疾病以大悲手執法關鑰開涅槃城示佛知見三僧祇劫難行苦行救諸衆生安住涅槃真實解脫於所生處常勤精進無有懈怠利益安樂一切有情為救衆生處捺落迦受苦無量如涅槃樂復發是願若一切衆生未得解脫我願常居地獄不證菩提慈氏當知即是菩薩摩訶薩第二精進勤求一切智智復次慈氏行此行已應當更發三種勝心求不退轉乃至三無數劫精進修行於一剎那無令間斷或有衆魔作沙門形或婆羅門形苦行之者種種異形於大乘中求諸過失勸修行者令其退轉作如是言佛道懸遠經百千劫難行苦行難捨能捨國城妻子象馬七珍奴婢僮僕身肉手足無所吝惜如是布施經千萬劫方證菩提無量衆生如是修習皆未成佛悉已退轉自取涅槃設成佛果亦入涅槃一種涅槃何須勤苦汝求利益修二種事一求現生常受快樂人天種種勝妙五欲隨意所作小有苦者亦勿須怖何以故譬如農夫豈懼蟲鹿不營種耶人天快樂亦復如是雖有小苦快樂無窮但自修持何憂何怖二者自求涅槃此生三生得阿羅漢自當解脫何用勤苦求佛果耶若復不能趣二乘者且受人天種種快樂設後厭離疾入涅槃譬如有人用功雖少獲利乃多復有一人功力極多事不成辦設汝布施種種艱勞都無所成自為欺誑汝今與我行住共俱出世涅槃進止同處慈氏當知菩薩摩訶薩修大乘者聞斯語已都不信從作是思惟此是惡魔嬈亂我耳而作障礙欲誘誑我令退菩提既知是已復發是心我今不應違本誓願受如斯語決定進求無上佛果而於大乘誓不退轉發三種心云何為三一者一切有情皆我宿世父母親友從無始際生死輪回受大艱苦於八寒八熱十六地獄受諸苦惱復於餓鬼傍生趣中及於人天亦復如是況是我之宿世父母內外親屬而無悲戀是故我今誓取菩提不應退屈慈氏當知此即菩薩摩訶薩不退轉中第一心也二者一切有情從無始來既為父母一一生處在母腹中寢食睡眠不得安止生育劬勞以大悲心血變成乳長時不倦咽苦吐甘功德日修願我成長自我薄祐夭壽而終父母悲號自拔頭髮椎胸墮淚食旨不甘一一生中皆有斯苦所出目淚其量淺深過四大海所飲母乳過四大河復次一切有情無始至今以恩愛故為我父母種種因緣為我捨命以是至今流轉未息若此有情勤苦修習無上菩提即此有情悉合成佛由為我故生死無窮復次一切有情從無始來憐愍我故造不善業心無改悔若此惡業可立形相計量積集過妙高山積業既然墮三惡趣于今不絶以是義故如何背恩自取涅槃而求解脫譬如衆人同犯王法繫在囹圄逃刑無路中有一人見牆小穴設諸方便自脫而行以是因緣免離苦難二乘之人亦復如是昔與衆生同為癡愛繫在三界生死囹圄求出無由中有一人見四諦門知苦斷集證滅修道獲阿羅漢自證涅槃修大乘者則不如是願共衆生同得解脫以戒定為雙手智慧為鈇鉞大悲為鉤鑰破煩惱賊摧生死軍開涅槃城升智慧殿慈氏當知此即菩薩摩訶薩修大乘者第二不退轉心三者菩薩摩訶薩作是思惟從無始際流轉至今一一有情互相繫屬身口意業苦惱他人作擾亂心發彼瞋恚劫奪財寶種種貪求斷他命根食他血肉如是殺害無量無邊設彼未終日夜思想以何方便斷彼命根持其血肉充我飲噉又懷憍慢恃己凌他説彼為非自言我是聞他勝事嫉妬心生不耐他人中毒令死見苦難者無有悲心喜不自勝何當早逝見富貴者意不欲之願犯刑名貶黜貧賤願他苦惱自受榮華願他財寶日夜銷亡願我資財日日增長願彼憂苦我恆安樂彼受憎嫌我納愛敬他作怨家自為親友彼恆墮落我得超升願他貧窮我唯富有我得智慧願彼愚癡無始生死日夜思惟以如是心自求安樂利益向己苦惱屬他無一衆生不被侵害名聞善事皆不願他口許心違常行如是種種迫脅令彼不安無量無邊不可備説復以惡教示導他人現在未來墮於險道詐作知見辨證他人令損珍財失其官爵以離間語鬪亂親疏巧詐多端令心相恨墮於地獄無有出期以粗惡言於他毀罵如以熱箭中彼身心乃至命終何時暫忘假立名字毀訾多端損惱衆生種種異語或作外道邪見仙人恚火燒心説邪惡法瞋恚熾盛墜陷有情蠱道呪術妖魅符書令諸衆生皆共修習互相損害疾病流行壯者衰羸少變令老明眼令瞽聰耳使聾端正之者而現醜容貢高之者而獲癩病修善之者而令作惡智慧之者使令癡狂長壽之者而令夭喪富貴之者而令貧賤乃至今日未絶流行復念我昔為外道師邪見教人非法説法法説非法令無量無邊諸有情類退菩提心墮於邪見非法之中從此命終墮捺落迦傍生鬼趣復有衆生於往世中受我邪教從嶮峻山投身而下入閻牟那河便取命終云得生天于今不絶復有無量衆生往殑伽河南閻牟河北二水中間有大神樹名尼拘陀其樹端正茂葉含翠扶踈蔭映地平廣博此為施場樹下多立三鈷鐵戟彼諸衆生求生天者於彼場中先行布施次剃髭髮入河沐浴望除罪垢然後上樹當鐵戟上投身而下自取命終從此死已云得生天無始至今流行未絶復有衆生受我邪教常自慳惜不行惠施若見施者起大瞋心見受施人復生恚怒何以故我見施者及受施人由此業緣俱墮地獄以是見故無量劫中受鋨鬼苦于今未脫復有衆生受我邪教多殺牛羊以血祀天何以故如是牛羊天賜與我我食其肉血應祭天無始至今受行其教已命終者墮惡趣中殘害未寧互相食噉以愚癡故不得涅槃復有衆生受我邪教於佛法僧常行誹謗復有衆生受我邪教不信三世善惡因果言無布施亦無供養亦無其果無護魔法無善行無惡行亦無業果無此世無他世無地獄無餓鬼無傍生無天無人無父無母一切衆生猶如酒醉造酒之人而以麴米溫涼調適遂有酒名飲則醉人此醉豈從父母生耶衆生亦爾父母和合本由染愛而有我生我命終已更無有生譬如斫樹燒已成灰種此灰者豈有樹生我身亦爾死已無生以是故知定無因果由此而於父母師長無有恭敬常毀罵之無量生中教此邪法令諸有情墮於地獄或有外道以火燒身或投水中自溺而死或利戟上宛轉而終或修狗行以口食糞而求生天或修牛戒如牛行李飲水噉草裸露而行不辨六親而作淫亂或有外道自餓不食盡日而立夜後方食或有外道五熱炙身隨日而轉或有外道常翹一足或有外道常奉事月白月一日噉食一口二日二口乃至滿月食十五口黑月初日減食一口二日二口至黑月盡但食一口或都不食或有外道常持雞戒散食在地以足撥取口拾而食知時而鳴或有外道裸形而行無有羞恥燖去毛髮日中而立隨日而轉於盛寒際處陰影中當風而立或有外道斷人命已而取髑髏盛其飲食或有外道裸形無恥以灰塗身或有外道炭墨塗身以人髑髏支節諸骨以為瓔珞花鬘鐶釧身首莊嚴或有外道馬尾騣髦織為衣服或有外道樹皮為衣或有外道鷲毛作衣或有外道雞毛為衣以如是等外道邪法教諸衆生以口業故無數衆生至今愚迷不得解脫復從無始乃至于今以身惡業苦惱衆生作獄卒身手執鐵鉗磔衆生舌灌注洋銅又以鐵槌打碎其骨又以鐵鋸解諸衆生又驅迫衆生上於劍樹抽出腸胃五藏而食又以鐵索縛束衆生擲灰河中使受諸苦旋即曳出置熱鐵上如魚在𨫼宛轉受苦又逼起坐以熱鐵杓盛以洋銅灌口令飲又以鐵鉗拔出其舌曳令長廣鐵犁耕之如上所説地獄苦中無始劫來我為此事種種身業苦惱衆生又作師子虎豹豺狼熊羆等獸殘害衆生飲血噉肉又作人王宰官士庶長者居士尊位之中抂法科稅非理捶楚不行王法損害有情以是思惟無始至今五趣衆生無不惱害斫頭剜眼刵耳劓鼻截舌噉肉敲骨出髓斬其手足乃至斷命又在人中不作餘業而為魁膾畋獵漁捕罘網矰繳奪衆生命所謂牛羊麞鹿狐兔雞豬魚鱉等身分割支節成大積聚而以販鬻如是殺害無量無邊經於無量俱胝劫中如是衒賣以自活命復次慈氏菩薩摩訶薩修大乘者應發是心如是思惟我以貪瞋癡故造作如是身口意業誘誑損害一切衆生現墮地獄餓鬼畜生受諸苦惱我今慚愧深自悔責作何方便以酬報之如是思惟更無方便能償斯愆唯有志求阿耨多羅三藐三菩提更無有能償此債者我得無上正等覺已於此流轉曠野磧中廣度衆生置涅槃城安樂之處以一切智智如意寶珠用酬無始所有深愆慈氏當知此即菩薩摩訶薩第三不退轉心也如上三心發起修行精勤不怠此之三心於大乘中一心修行得不退轉復次慈氏菩薩摩訶薩以此五種發菩提心修行大乘速能成就一切智智
