body:
  text: 大乘理趣六波羅蜜多經序御製大朴既散有為遂作名利牽乎代巧智喪乎真愛惡攻其性情因緣堅其染習內則百慮無節外則六根競誘天理滅而莫知道源迷而忘返淪溺苦海劫盡還初惟至人了萬物之宗越三界之表廓獨立而不改遍諸有而常然故能開導群疑濟拔流品六波羅蜜經者眾法之津梁度門之圓極也昔日月燈明如來為菩薩說歷劫曠遠真偈寂寥文殊師利往於耆闍會中甞與彌勒菩薩語及斯事成一切種智會無量義因唯佛能知唯佛能說教必有主其在茲乎是以釋迦如來為法而出俟時而現三身不異故處代而常離萬行無修故隨方而自在運慈悲之力開護攝之門因其六塵示之六度導於法分令證法身結習紛綸乘理而悟是真般若之旨也故有慈氏善問大音讚言天垂寶花雲集仙蓋甘露流液光明燭幽使迷方淺深皆得自然之慧恒沙億眾能通般若之智甞試論之先儒有言誠者自成而道自導也夫誠己於內則不勉而中不思而得誠物於外則不言而應不為而成其內者證法之身其外者大悲之力德產之致也密化育之功也大春風發吹萬類咸滋旭日昇晝群陰盡釋乾坤易簡之道是則大同神明幽贊之情孰云區別殊塗一至其理固然朕虔奉丕圖保乂蒸庶思建皇極以昇大猷遐想靈蹤期於叶契而舍城妙說久祕梵文徒懷瀉瓶未啟遺夾微言不昧將或起予於是罽賓沙門般若受旨宣揚光宅寺沙門利言為之翻譯時大德則有資聖寺道液醴泉寺超悟慈恩寺應真莊嚴寺圓照光宅寺道岸西明寺圓照章敬寺𮗿空西明寺良秀等法門領袖人中龍象證明正義輝潤玄文知釋迦之寶城識眾尊之滿字以貞元四年歲次戊辰十一月二十八日於西明寺譯成上進凡一部十卷龍神翼衛如從金口之傳梵眾護持無異毫光之現朕齋心滌慮仰味宗源聞所未聞實為希有然以汲引之旨流布為先庶憑真筌永濟浮俗聊因暇日三復斯經雖法海甚深而波流不讓舉其梗概照悟將來
