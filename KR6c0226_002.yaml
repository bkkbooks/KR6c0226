多迦耶七十二莎訶七十三烏芻讖摩耶七十四莎訶七十五烏芻讖摩嚕涅囉二合耶七十六莎訶七十七瑜上聲滿七十八儞尾二合瑟底七十九也失者迦失質八十阿寐捺囉二合襪底八十一𦽆底末底八十二播那八十三壤誐平八十四迂嚧八十五茗拏囉八十六穀乞史二合八十七紇㗚奈監八十八摩呼八十九塞建二合那九十屹哩二合嚩平聲九十一賀努九十二塢瑟侘二合九十三匿乃職反賀嚩二合九十四娜娑九十五室嚕二合怛囉二合九十六羅邏上吒九十七室哩山九十八諾賀彌九十九莎訶一百癹吒二合一百一爾時毗沙門天王及諸天等各說如是陀羅尼已俱白佛言大聖世尊我等若見如是法師受持讀誦乃至一頌一句常作擁護滌除一切災難苦厄及諸毒氣呵罵捶打種種疾患魑魅魍魎不吉祥事皆悉消滅佛告諸大士及毗沙門天王汝等善能守護如是持經法師此經名字尚不可聞何況盡能受持讀誦恭敬供養尊重讚歎以種種塗香末香燒香華鬘衣服及妙寶蓋繒綵幢幡香油酥燈以如是等百千萬種供養法師應先發願聞此經已如說修行我今以此持經法師付囑汝等應當擁護乃至親屬亦當守護令無衰患使得安樂大乘理趣六波羅蜜多經發菩提心品第三爾時薄伽梵作師子吼顯明祕密總持門已時慈氏菩薩摩訶薩即從座起偏袒右肩右膝著地一心合掌而白佛言善哉善哉大聖世尊能以大悲讚說如是祕密甘露勝陀羅尼守護法師唯願世尊哀愍衆生宣說阿耨多羅三藐三菩提法令諸有情未發心者云何發心已發心者云何修行復何因緣於大乘心得不退轉爾時薄伽梵告慈氏菩薩摩訶薩言若有善男子善女人欲為有情修大乘行欲度有情置大涅槃應當先發五種勝心云何為五一者於諸有情普發平等大慈悲心二者於一切種智心不退轉三者於諸有情起親友想於險難中誓當救護四者常於有情起負債想五者恆懷慙愧何時償畢能發如是五種心者速能證得阿耨多羅三藐三菩提復次慈氏菩薩摩訶薩云何於大乘中一心修行得不退轉如往昔時有一商人聰慧明達常行仁孝恆見父母宗親貧苦常懷憂惱逼切身心以何方便而能給濟作是思惟無過入海採如意寶而供給之得離貧苦以是因緣發勇猛心不惜軀命從家而出種種方便求覓資糧及諸善伴船及船師於其中路遇一異人從海而還乃問此人如是忩遽欲何所之商人具答如上因緣為救貧窮今欲入海求如意寶以相資給彼異人言我昔離家亦復如是為濟親族貧窮諸苦既發家已路經曠野度大砂磧絶無水草多有野象虎豹豺狼毒蛇師子或遇劫賊大山大河飢渴寒熱驚懼怖畏種種危難與彼船師方至大海又遇惡風大魚惡龍雷電雹雨鼓浪洄澓多有留難不可具說雖受如是種種諸苦尚不能獲如意寶珠但得資身粗自供足猶未能濟貧乏之親今勸仁者勿強艱苦徒自疲勞吾欲與仁別為經理所以者何然彼大海有種種難黑風黑山藥叉羅剎摩竭蛟龍衆難非一但曾聞有如意珠名往者千萬獲無一二以是因緣勸於仁者宜速回還爾時商主聞是語已倍復增進發三勝心入海不退云何為三一者父母兄弟宗親貧苦若斯如何空歸不相救濟二者我之親屬昔時富有惠我衣食憐愍於我今者貧窮命不全濟如何放捨而欲退還三者我在家時處理家務策役驅使大小僮僕種種呵責如何貧苦不相賑恤令彼歡喜而欲退還以是因緣念酬恩德發大勇猛決定前進要當入海求如意寶得已還家濟於親屬恣其所用永離艱窮菩薩摩訶薩亦復如是發菩提心觀於十方六趣四生皆是我之宿世父母憐愍我故造諸惡業墮於地獄餓鬼畜生受諸苦惱以是因緣而自思惟以何方便濟斯苦難作是念已唯有入於六波羅蜜多大法海中求佛種智拯濟有情生死之苦如是思已發大勇猛無退屈心精進勤求無有懈倦種種方便求覓資糧菩提善伴法及法師行至中路遇一魔王領諸眷屬或現天身或顯人身婆羅門身或作商主苾芻苾芻尼身或餘種種異類之身而彼魔王問菩薩言汝今忩忙欲詣何所菩薩答言我為一切苦惱衆生今欲入於六度大海求佛種智如意寶珠以救一切貧乏衆生魔王復云我初發心亦復如是為度一切苦惱衆生出生死家度大流轉曠野砂磧備受飢渴盜賊恐怖衆難非一方至六度大法海中或遇乞頭或逢乞眼耳鼻舌身手足支節心肺腸胃肝膽脾腎國城妻子奴婢僕使如是種種隨乞而施不生慳吝勤求智寶經無量劫生死流轉在於苦海雖受種種諸苦難事猶不能獲無上菩提而但回求阿羅漢果出離三界寂滅涅槃我今勸汝勿強勞苦應自修持吾欲與汝共階此果所以者何我念三塗常受飢苦心思吞噉仰面向空誰來入口充我一飽種種苦難逼切身心人命無常過於山水善知識者難遭難遇若不信受後悔何追生死海中流轉不定心如水月何有實耶惡知識者易見易逢恆樂勸人行菩薩道捨財捨命望趣菩提況諸佛出興時乃一顯求者千萬得無一二以是勸仁不須勞苦應求解脫自取涅槃又三無數劫受諸勤苦方能獲得佛果菩提此生三生證阿羅漢一種無學何用苦為無智愚人心希佛果備歷艱苦經無量劫尚未聞證阿羅漢果何況能得無上菩提譬如有人獲一小鳥更見有一迦嚕囉王即放手中已所執鳥便前捕捉迦嚕囉王大者飛翔小者復失愚求佛果亦復如是棄此求餘二果俱失既知是已願早回心於此生中必證羅漢爾時菩薩聞是語已轉增勇猛發三種心云何為三一者一切衆生從無始際生死已來皆我所親或為朋友現受苦惱未得免離如何退還二者一切衆生從無始已來給我衣食憐愍我深今受輪回苦難非一云何未報乃生退心三者一切衆生從無始際皆我眷屬策役驅使轉相呵責未曾少分酬報彼恩以是因緣不應退屈更增勇猛求證菩提若證菩提一切智寶用濟生死苦難衆生是名菩薩摩訶薩於大乘中一心修行得不退轉復次慈氏當知即是菩薩摩訶薩修大乘行發五種心此五心中一者於諸有情起大悲心二者為諸有情求一切智心無退轉此二心者於大乘法精進修行三者一切有情皆我親友四者一切有情於我有恩未有毫釐用相酬報五者一切有情皆我眷屬我曾於彼起不善業種種呵罵非理責罰深心慚愧何時償畢此之三心令諸菩薩勇猛不退乃至證得阿耨多羅三藐三菩提
