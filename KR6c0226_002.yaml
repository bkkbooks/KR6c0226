body:
  text: 罽賓國三藏般若奉詔譯陀羅尼護持國界品第二爾時世尊欲說甚深理趣決定了義菩薩摩訶薩六波羅蜜多時即於東方有大光明金色晃耀照王舍大城迦蘭多竹林精舍乃至三千大千世界皆作金色而此世界所有諸天護世四王釋提桓因乃至他化自在天王大梵天王及日月星辰末尼燈燭所有光明皆不能及除佛世尊及彼灌頂受職菩薩二種光已餘一切光皆悉映弊無復顯現又此三千大千世界日月威光所不照處如是日月有大威德有大光明不能照彼幽瞑衆生由佛光明令彼有情各得相見此諸世界所有宮殿屋舍牆壁山林草木種種諸物亦不能障如是光明所有諸山香山寶山黑山雪山及妙高山鐵圍山大鐵圍山目真鄰陀山摩訶目真鄰陀山如是等山遇斯光已影透內外無所障礙下至阿鼻地獄上至非想非非想天悉亦蒙光靡不照耀如是三千大千世界所有諸光合成一光而無二相其中衆生遇斯光者罪垢煩惱皆得銷除身心安樂各作是念我等蒙光得是安樂爾時會中忽然而有六十俱胝七寶蓮華猶如車輪從地涌出香氣芬馥其色美妙種種雜色令人樂見其一一華復有無量無邊百千萬葉其衆會上虛空之中自然而有微妙寶蓋珠網交絡遍覆大衆如迦遮鄰底迦柔軟妙服觸之悅意其蓮華中所出香氣周遍三千大千世界諸世界中所有天香龍神等香及餘草木種種諸香此香及處無復香氣又此三千大千世界種種有情蒙香所熏喜不自勝皆悉發心煩惱罪垢一切消滅爾時阿難陀見是光明希有之相奇特殊妙得未曾有即從座起整理衣服偏袒右肩長跪合掌而白佛言世尊以何因緣現此光明奇特之相此之光明及寶花香昔未聞見從何所來而現斯瑞唯願世尊分別解說令此衆會咸悉聞知爾時世尊告阿難陀汝今當知從此東方有世界名曰不眴彼有菩薩摩訶薩名無盡藏與六十俱胝大菩薩衆恭敬圍繞發意欲來故現斯瑞爾時世尊說是語時而此大地六種震動彼無盡藏菩薩放大光明現大神變威德自在雨妙香花無量諸天以種種音樂迎彼菩薩而為供養彼無盡藏菩薩與六十俱胝菩薩摩訶薩衆而來至此迦蘭多迦竹林精舍住虛空中高七多羅樹皆悉恭敬合掌向佛異口同音聲遍三千大千世界讚歎如來無量功德以微妙音而說頌曰大哉大悟無染著無礙妙智清淨眼斷除三毒無明習我禮無等大悲尊遠離怖畏諸疑網十力辨才無所畏異道邪徒皆戰栗自在猶如師子王如來慧日大光明普照十方無罣礙無明暗障惑已盡如日舒光照世間無恃無依苦厄者生老病死久漂流真實悲愍大慈尊能拔輪回苦海難無明顛倒生死源種種妄想為波浪二障已除智自在遊行不染如蓮花諸法無我本空寂猶如谷響性皆虛無造無受如幻化救世大悲恆演說佛了諸法如浮雲亦如瀑水速流注世法不堅愚所集聖智能觀永斷除佛眼猶若青蓮花超過日月百千倍三世人天共稱讚我禮調御難思議佛具如是無邊德廣度群品若恆沙無漏功德妙莊嚴是故我今頭面禮爾時無盡藏菩薩與六十俱胝菩薩摩訶薩衆以是微妙伽他讚如來已從空而下頭面禮足右繞七匝承佛聖旨各就蓮花跏趺而坐爾時阿難陀以佛神力從座而起偏袒右肩長跪合掌而白佛言此無盡藏菩薩從何所來彼世界中佛號何等去此幾何唯願世尊分別解說爾時世尊告阿難陀汝自問之彼無盡藏菩薩當為汝說時阿難陀即問無盡藏菩薩摩訶薩言族姓子從何所來彼世界中佛號何等去此遠近唯願分別時無盡藏菩薩言汝今猶有去來之相而未除耶阿難陀言我已久知此義無盡藏菩薩言汝若已知云何更問乃生二種分別之心若言來者是緣起義若言去者是緣滅義何處無此生滅相耶然我國土無有去來生滅之相若無去來即是聖智所行之處若有去來即是世間生滅之相若有音聲文字亦是世間生滅起盡之相然我國土本無文字亦無言說起盡之相若無起盡即是自覺聖智所行之境離文字相是則解脫爾時阿難陀白無盡藏菩薩言聖者我不敢問辨才大士如是深妙之義唯問聖者所居世界去此遠近及佛名字所未聞事譬如關塞收稅之人但有往來不揀財寶多少有無皆合問之今我聲聞亦復如是從他聞說正法之聲勝解修行自求涅槃是名聲聞今見聖者法應問之我若聞已樂欲修習得安樂故為欲增廣大乘法故又一切聲聞獨覺悉從大乘出故所以我問聖者從何所來去此遠近佛號何等時無盡藏菩薩答阿難陀言如來應正等覺現在不遠何不問之佛當為汝記別此事於此衆會悉得無疑時阿難陀從座而起整理衣服偏露右肩長跪合掌而白佛言唯願大聖世尊為我說之唯願善逝為我說之此會無量無邊有情因聞此法皆欲被精進甲修菩薩行爾時薄伽梵告阿難陀曰汝今諦聽善思念之吾當為汝分別解說彼佛世界遠近之事及佛名號功德莊嚴彼佛如來應正等覺無礙無著一切智智汝等大衆皆應信受勿生驚疑時阿難陀白佛言大聖世尊我於今者願樂欲聞爾時薄伽梵告阿難陀去此東方過十殑伽沙微塵等世界有世界名曰不眴彼世界中有薄伽梵名曰普賢如來應正等覺明行圓滿善逝世間解無上士調御丈夫天人師佛世尊今現在彼說大乘法無盡藏菩薩從彼世界而來至此彼佛世尊唯以諸大菩薩而為其衆無有聲聞辟支佛名何況有實而彼菩薩久積淨業布施調伏善御六根常行忍辱無所障礙堅固菩提勤行精進成就善巧靜慮解脫及三摩地三摩鉢底遊戲神通大智光明自在無礙文字巧妙慈悲喜捨猶若虛空悉能摧伏異道邪論降魔勞怨勇猛不退成就佛智微妙甚深如來十力四無所畏辨才不斷智慧無礙深入緣起能離有無行於中道離我我所有情壽命養育士夫補特伽羅意生儒童作者受者知者見者斷見常見遠離一切妄執諸見得陀羅尼素呾纜王以如來印之所印也普觀衆生堅固不捨等如一子無有二心演甘露法猶師子吼上中下類一切有情聞斯法已無不獲益速疾安住涅槃正路三明六通具八解脫紹三寶種無有斷絶灌頂受職當作法王能了有情度未度者詣菩提樹坐於道場處師子座自在無畏降伏魔怨能現佛身相好具足能轉無上清淨法輪純以大菩薩僧而為眷屬圍繞說法利益有情爾時會中一切衆生聞佛說彼諸大菩薩功德法已歡喜踊躍不能自勝即以無量天嗢鉢羅華鉢特摩華拘牟頭華奔茶利迦華曼荼羅華摩訶曼荼羅華及餘種種雜華而散佛上及無盡藏菩薩等六十俱胝菩薩大衆之上而為供養歡喜自慶而作是言我等今日獲大善利得見如是大菩薩衆若餘國土一切衆生聞我供養得親近者亦獲善利聞彼菩薩功德法者皆發無上正等覺心時此會中三十六億衆生皆發阿耨多羅三藐三菩提心爾時薄伽梵復告具壽阿難陀言彼不眴世界無諸苦難及三惡趣亦不聞名亦無五衆犯禁之名亦無煩惱勞慮等聲亦無女人嫉妬慳吝懈怠瞋恚亂意愚癡亦無障蓋并諸習氣亦無種種上中下等雜類之名亦無三乘差別之號佛法僧寶平等一相亦無魔及魔民異道邪見亦無飢渴寒熱等事及我我所男女等相互相攝受種種異名而彼世界廣博嚴淨以六十萬億俱胝佛剎為一佛土亦無日月唯以菩薩願力光明而為照耀地平如掌純以帝青及吠琉璃末尼珠等種種雜寶間錯莊嚴又以衆寶蓮花而散其上其花鮮明柔軟第一如天妙觸迦遮鄰底迦衣八重寶樹交映蓊鬱周匝圍繞以為垣牆種種雜花而為嚴飾亦無沙礫坑坎丘陵土石黑山荊棘毒刺唯有無量妙寶高山雖有天人無別異相不假雜食而用資身亦無便利穢污不淨常以法喜禪悅為味國土嚴淨唯佛法王化諸菩薩無有文字亦無言說彼諸菩薩受化之時來詣佛所恭敬合掌目不暫眴瞻仰如來念佛三昧自然成就故彼世界名為不眴念佛三昧云何是耶所謂非色相生亦非受想行識生非前後邊際智慧生亦非現在見聞所生佛告阿難其念佛三摩地不可思議於諸法無所行而觀諸法如實相無說無示無相無名此即名為念佛三昧爾時曼殊室利菩薩摩訶薩即從座起偏袒右肩右膝著地合掌恭敬而白佛言大聖世尊若有善男子善女人受持此六波羅蜜多經深妙理趣得幾所福佛告曼殊室利菩薩摩訶薩若有善男子善女人於九十億殑伽沙俱胝那庾多百千佛所供養恭敬尊重讚歎於意云何此善男子善女人所得功德寧為多不曼殊室利白佛言甚多世尊甚多善逝佛告曼殊室利菩薩摩訶薩我今為汝分別演說若有善男子善女人能於此六波羅蜜多經甚深理趣大乘法寶乃至一頌一句受持讀誦書寫解說如說修行而此功德勝前功德所以者何此六波羅蜜多大乘理趣甚深法門乃是一切諸佛之母一切如來從此生故爾時曼殊室利菩薩摩訶薩白佛言大聖世尊我今為欲擁護國界及受持此經典者常為守護為欲滌除一切障難說陀羅尼祕密文句第一根本身真言曰南謨薩嚩尾泥一唵二嚩平聲引移倪以反濕嚩二合囉第二心真言曰唵一穆第三頭真言曰唵一母鼻音穆第四頭髻真言曰唵一菴暗穆第五甲胄真言曰唵一靉引穆莎訶第六器仗真言曰唵一鏖懊高反合口呼穆大聖世尊此陀羅尼文句是三世諸佛法身肢節過去未來現在諸佛之所宣說若有善男子善女人於間靜處著新淨衣發大殷重無分別心誦百千遍必得聞持永無忘失若有善男子善女人持是經者當知此人即是法師若有人輕毀違犯此法師者當知即是輕毀違犯過去未來現在諸佛爾時薄伽梵讚曼殊室利菩薩摩訶薩言善哉善哉汝今說是諸佛真言作大利益擁護慈愍一切衆生滌除障難爾時普賢菩薩摩訶薩即從座起偏袒右肩右膝著地合掌恭敬而白佛言大聖世尊我亦為欲擁護國界及受持此經典者常作守護為欲滌除障難說陀羅尼祕密文句南謨囉紇二合旦一南謨悉馱南二南謨阿利也南三南莫娑去怒南四怛地儞也反他五唵六止哩止哩尼七悉哩悉哩尼八呬哩呬哩尼九呬吒呬吒十翳醯兮十一陀囉尼三縻十二莎訶世尊此陀羅尼祕密文句乃是三世諸佛之所宣說若有善男子善女人持是經者當知此人即是法師若有人輕毀此法師者當知即是違犯過去未來現在三世諸佛爾時大聖觀自在菩薩摩訶薩即從座起偏袒右肩右膝著地合掌恭敬而白佛言大聖世尊我亦為欲擁護彼善男子善女人持是經者常作守護及所住國土為欲滌除一切諸難說陀羅尼祕密文句南謨娑滿多沒馱南一怛地儞也反他二唵三哩弭嚟四哩弭嚟五誐攞哩弭嚟六簡侘丑加反哩弭嚟七尾止嚟八莎訶世尊此陀羅尼乃是三世諸佛之所宣說若有人能持是經者當知此人即是法師若人輕毀此法師者當知即是輕毀三世諸佛爾時曼荼羅諸天菩薩皆悉集會其名曰金剛薩埵金剛王金剛染金剛善哉金剛寶金剛威金剛幢金剛愛金剛法金剛利金剛因金剛語金剛羯磨金剛護金剛藥叉金剛拳金剛薩埵金剛寶金剛法金剛羯磨金剛嬉戲金剛鬘金剛歌金剛舞金剛香金剛華金剛燈金剛塗香金剛鉤金剛索金剛鎖金剛鈴金剛阿尾奢等異口同音共說法身種子陀羅尼曰唵慕缺阿引聲吽怛闌二合紇哩二合惡此等大士諸大菩薩恭敬合掌前白佛言大聖世尊我等若見有人受持此經乃至一頌一句我等恭敬供養尊重是人如毗盧遮那如來等無有異爾時六波羅蜜多菩薩具足威儀而於佛前各各自說陀羅尼祕密文句第一布施波羅蜜多菩薩說真言曰南謨薄伽伐諦曳二合一怛哩二合瑟拏二合哩二摩訶撥㝹迷三吽索蘇各反